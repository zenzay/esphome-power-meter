# Power Meter v0.9.8.2
#
# Power Meter with Cost Tracking.
#
# ​ Sic biscuitus disintegratum ​

substitutions:
  device_name: "power-meter"
  device_description: "Power Meter with Cost Tracking"
  friendly_name: "Power Meter"
  pulse_rate: '1000.0'
  currency: 'DKK'
  pulse_pin: '26'
  ha_price_default: '2'
  ha_price_sensor: 'stromligning_current_price_vat'
  update_interval: '60s'
  interval_interval: '1s'
  flag_reset_monthly: '8'
  flag_reset_daily: '16'
  flag_reset_hourly: '32'
  flag_reset_total: '128'
  flag_reset_mask: '248'

# substitutions:
#          pulse_rate: Pulse Rate of the LED on your power-panel-meter
#            currency: Currency in which to represent costs
#           pulse_pin: GPIO pin for the pulse_meter
#     ha_price_sensor: entity_id of the sensor used in Home Assistant to track spot prices.
#     update_interval: Seconds (ticks in 1s interval loop) between updating sensors.

esphome:
  name: $device_name
  friendly_name: $friendly_name
  comment: $device_description
  project:
    name: zenzay.power_meter
    version: '0.9.8.2'

preferences:
  flash_write_interval: 1h

esp32:
  board: nodemcu-32s
  framework:
    type: arduino

logger:
  baud_rate: 0

api:

ota:
  - platform: esphome
    password: !secret ota_power_meter

wifi:
  ssid: !secret wifi_ssid
  password: !secret wifi_password

time:
  - platform: homeassistant
    id: esp_time
#  - platform: sntp
#    id: esp_time
#    timezone: Europe/Copenhagen
#    servers:
#      192.168.1.1

globals:
  - id: usage_total         # total kwh usage
    type: float
    restore_value: yes
    initial_value: '0'

  - id: usage_month         # monthly kwh usage
    type: float
    restore_value: yes
    initial_value: '0'

  - id: usage_day           # daily kwh usage
    type: float
    restore_value: yes
    initial_value: '0'

  - id: usage_hour          # hourly kwh usage
    type: float
    restore_value: no
    initial_value: '0'

  - id: cost_total          # total cost
    type: float
    restore_value: yes
    initial_value: '0'

  - id: cost_month          # monthly cost
    type: float
    restore_value: yes
    initial_value: '0'

  - id: cost_day            # daily cost
    type: float
    restore_value: yes
    initial_value: '0'

  - id: cost_hour            # hourly cost
    type: float
    restore_value: no
    initial_value: '0'

  - id: uptime_days         # uptime day counter
    type: float
    restore_value: yes
    initial_value: '0'

  - id: price_kwh_avg       # average kwh price. Will be used if 'Use KwH Price Average' switch is set.
    type: float
    restore_value: yes
    initial_value: '0'

  - id: price_per_kwh       # price per kwh, should be automatically imported from HA, but can also be set manually
    type: float
    restore_value: no
    initial_value: '0'

  - id: uptime_start_ts     # uptime start timestamp
    type: int
    restore_value: no
    initial_value: '0'

  - id: op_flag             # bitmask for operational flags
    type: int
    restore_value: no
    initial_value: '0'
      
number:
  - platform: template
    id: pulse_rate
    name: 'Set Pulse Rate'
    unit_of_measurement: 'Pulse/kWh'
    icon: mdi:pulse
    optimistic: true
    mode: box
    min_value: 100
    max_value: 10000
    step: 100
    initial_value: 1000
    restore_value: true
    entity_category: 'config'

  - platform: template
    name: 'Set Total Usage'
    unit_of_measurement: 'kWh'
    icon: mdi:meter-electric
    optimistic: true
    mode: box
    min_value: 0
    max_value: 100000
    step: 0.001
    initial_value: 0
    disabled_by_default: true
    entity_category: 'config'
    on_value:
      lambda: id(usage_total) = x;

  - platform: template
    name: 'Set Total Cost'
    unit_of_measurement: $currency
    icon: mdi:cash-100
    optimistic: true
    mode: box
    min_value: 0
    max_value: 100000
    step: 0.001
    initial_value: 0
    disabled_by_default: true
    entity_category: 'config'
    on_value:
      lambda: id(cost_total) = x;

  - platform: template
    name: 'Set Uptime'
    unit_of_measurement: 'days'
    icon: mdi:timelapse
    optimistic: true
    mode: box
    min_value: 0
    max_value: 365
    step: 0.01
    initial_value: 0
    disabled_by_default: true
    entity_category: 'config'
    on_value:
      lambda: |-
        id(uptime_start_ts) = 0;
        id(uptime_days) = x;

  - platform: template
    name: 'Set kWh Price'
    icon: mdi:cash-100
    unit_of_measurement: '${currency}/kWh'
    optimistic: true
    mode: box
    min_value: 0
    max_value: 100
    step: 0.001
    initial_value: $ha_price_default
    disabled_by_default: true
    entity_category: 'config'
    on_value:
      lambda: |-
        id(price_per_kwh) = x;
        id(update_price_kwh_avg).execute();

  - platform: template
    id: power_problem_level
    name: 'Set Problem Level'
    icon: mdi:alert
    unit_of_measurement: 'kWh'
    optimistic: true
    mode: box
    min_value: 0.1
    max_value: 100
    step: 0.1
    initial_value: 1
    entity_category: 'config'

switch:
  - platform: template
    name: "Use kWh Price Average"
    id: use_kwh_price_average
    icon: "mdi:toggle-switch-outline"
    optimistic: True
    entity_category: 'config'

button:
  - platform: template
    name: 'Reset Totals'
    device_class: restart
    entity_category: 'config'
    on_press:
      lambda: id(op_flag) = $flag_reset_mask;

  - platform: template
    name: 'Reset kWh Price Average'
    entity_category: 'config'
    on_press:
      lambda: |-
        id(price_kwh_avg) = 0;
        id(update_price_kwh_avg).execute();

  - platform: restart
    name: 'Reboot'
    entity_category: "diagnostic"
  - platform: shutdown
    name: 'Shutdown'
    entity_category: "diagnostic"
  - platform: factory_reset
    name: "Factory Reset"
    entity_category: "diagnostic"

binary_sensor:
  - platform: template
    name: 'Power Status'
    id: power_status_sensor
    device_class: problem
    lambda: |-
      return ( id(usage_hour) >= id(power_problem_level).state);

sensor:
  - platform: homeassistant
    id: ha_price_per_kwh
    entity_id: 'sensor.${ha_price_sensor}'
    on_value:
      lambda: |-
        if (!(isnan(x))) {
          id(price_per_kwh) = x;
          id(update_price_kwh_avg).execute();
        }

  - platform: pulse_meter
    name: 'Power Use'
    id: power_pulse_meter
    unit_of_measurement: 'W'
    state_class: measurement
    device_class: power
    icon: mdi:flash-outline
    accuracy_decimals: 0
    pin: $pulse_pin
    internal_filter_mode: EDGE
    internal_filter: 100ms
    filters:
      - lambda: return x * 60.0f * ( id(pulse_rate).state / 1000.0f );

    total:
      id: power_pulse_total
      on_value:
        lambda: |-
          const float energy = 1 / id(pulse_rate).state;
          const float cost = energy * id(price_per_kwh);
          id(usage_total) += energy;
          id(usage_day) += energy;
          id(usage_month) += energy;
          id(usage_hour) += energy;
          id(cost_total) += cost;
          id(cost_day) += cost;
          id(cost_month) += cost;
          id(cost_hour) += cost;
          id(usage_total_sensor).publish_state(id(usage_total));
          id(usage_hour_sensor).publish_state(id(usage_hour));

  - platform: template
    name: 'Usage Total'
    id: usage_total_sensor
    unit_of_measurement: 'kWh'
    icon: mdi:meter-electric
    state_class: total_increasing
    device_class: energy
    accuracy_decimals: 3
    update_interval: never

  - platform: template
    name: 'Usage Hourly'
    id: usage_hour_sensor
    unit_of_measurement: 'kWh'
    icon: mdi:meter-electric
    state_class: total_increasing
    device_class: energy
    accuracy_decimals: 3
    update_interval: never

  - platform: template
    name: 'Usage Daily'
    id: usage_day_sensor
    unit_of_measurement: 'kWh'
    icon: mdi:meter-electric
    state_class: total_increasing
    device_class: energy
    accuracy_decimals: 3
    update_interval: $update_interval
    lambda: return id(usage_day);

  - platform: template
    name: 'Usage Monthly'
    id: usage_month_sensor
    unit_of_measurement: 'kWh'
    icon: mdi:meter-electric
    state_class: total_increasing
    device_class: energy
    accuracy_decimals: 3
    update_interval: $update_interval
    lambda: return id(usage_month);

  - platform: template
    name: 'Cost Now'
    id: cost_now_sensor
    icon: mdi:cash-fast
    accuracy_decimals: 3
    unit_of_measurement: '${currency}/h'
    device_class: monetary
    update_interval: 5s
    lambda: |-
      float watt = id(power_pulse_meter).state;
      static float prev = -1;
      if ( isnan(watt) ) {
        watt = 0;
      }
      if (watt == prev) {
        return {};
      } else {
        prev = watt;
        if ( id(use_kwh_price_average).state ) {
          return id(price_kwh_avg) / 1000 * watt;
        } else {
          return id(price_per_kwh) / 1000 * watt;
        }
      }

  - platform: template
    name: 'kWh Price Average'
    id: kwh_price_average
    icon: mdi:cash-100
    accuracy_decimals: 3
    unit_of_measurement: $currency
    device_class: monetary
    update_interval: never

  - platform: template
    name: 'Cost Total'
    icon: mdi:cash-100
    id: cost_total_sensor
    unit_of_measurement: $currency
    accuracy_decimals: 3
    device_class: monetary
    update_interval: $update_interval
    lambda: |-
      if (id(use_kwh_price_average).state) {
        return id(price_kwh_avg) * id(usage_total);
      } else {
        return id(cost_total);
      }

  - platform: template
    name: 'Cost Daily'
    icon: mdi:cash-100
    id: cost_day_sensor
    unit_of_measurement: $currency
    accuracy_decimals: 3
    device_class: monetary
    update_interval: $update_interval
    lambda: |-
      if (id(use_kwh_price_average).state) {
        return id(price_kwh_avg) * id(usage_day);
      } else {
        return id(cost_day);
      }

  - platform: template
    name: 'Cost Monthly'
    icon: mdi:cash-100
    id: cost_month_sensor
    unit_of_measurement: $currency
    accuracy_decimals: 3
    device_class: monetary
    update_interval: $update_interval
    lambda: |-
      if (id(use_kwh_price_average).state) {
        return id(price_kwh_avg) * id(usage_month);
      } else {
        return id(cost_month);
      }

  - platform: template
    name: 'Cost Hourly'
    icon: mdi:cash-100
    id: cost_hour_sensor
    unit_of_measurement: $currency
    accuracy_decimals: 3
    device_class: monetary
    update_interval: $update_interval
    lambda: |-
      if (id(use_kwh_price_average).state) {
        return id(price_kwh_avg) * id(usage_hour);
      } else {
        return id(cost_hour);
      }

  - platform: template
    name: 'Cost Daily Average'
    icon: mdi:cash-100
    id: cost_daily_avg_sensor
    accuracy_decimals: 3
    unit_of_measurement: $currency
    device_class: monetary
    update_interval: $update_interval
    lambda:
      if (id(uptime_days) < 1) {
        return id(cost_day);
      } else {
        return id(cost_total) / id(uptime_days);
      }

  - platform: template
    name: 'Usage Daily Average'
    icon: mdi:meter-electric
    id: usage_daily_avg_sensor
    accuracy_decimals: 3
    unit_of_measurement: 'kWh'
    device_class: energy
    update_interval: $update_interval
    lambda:
      if (id(uptime_days) < 1) {
        return id(usage_day);
      } else {
        return id(usage_total) / id(uptime_days);
      }

  - platform: template
    name: 'Uptime'
    icon: mdi:timelapse
    id: uptime_sensor
    accuracy_decimals: 3
    unit_of_measurement: 'days'
    update_interval: $update_interval
    lambda: return id(uptime_days);


interval:
  - interval: $interval_interval
    then:
      lambda: |-
        static uint32_t last_month = 0;
        static int last_hour = -1;
        auto time = id(esp_time).now();
        const float uptime_secs = id(uptime_days) * 60.0f * 60.0f * 24.0f;
        if ( time.is_valid() )
        {
          if ( id(uptime_start_ts) == 0 ) {
            id(uptime_start_ts) = time.timestamp - uptime_secs;
          } else if ( ( time.timestamp - id(uptime_start_ts) ) > uptime_secs ) {
            id(uptime_days) = (time.timestamp - id(uptime_start_ts)) / 60.0f / 60.0f / 24.0f;
          }
          if ( time.hour != last_hour ) {
            if (last_hour >= 0) {
              if (time.hour == 0) {
                id(op_flag) |= $flag_reset_daily;
              }
              id(op_flag) |= $flag_reset_hourly;
            }
            last_hour = time.hour;
          }
          if ( time.month != last_month ) {
            if (last_month != 0) {
              id(op_flag) |= $flag_reset_monthly;
            }
            last_month = time.month;
          }
        }
        if ( id(op_flag) & $flag_reset_total ) {
          ESP_LOGD("debug", "reset total");
          id(uptime_start_ts) = 0;
          id(uptime_days) = 0;
          id(usage_total) = 0;
          id(cost_total) = 0;
        }
        if ( id(op_flag) & $flag_reset_daily ) {
          ESP_LOGD("debug", "reset daily");
          id(usage_day) = 0;
          id(cost_day) = 0;
        }
        if ( id(op_flag) & $flag_reset_monthly ) {
          ESP_LOGD("debug", "reset monthly");
          id(usage_month) = 0;
          id(cost_month) = 0;
          id(price_kwh_avg) = 0;
        }
        if ( id(op_flag) & $flag_reset_hourly ) {
          ESP_LOGD("debug", "reset hourly");
          id(usage_hour) = 0;
          id(cost_hour) = 0;
        }
        id(op_flag) = 0;         // making sure the flag operations are one-shot

script:
  - id: update_price_kwh_avg
    mode: single
    then:
      lambda: |-
        static int count = 0;
        if (id(price_kwh_avg) == 0) {
          count = 0;
        }
        count++;
        id(price_kwh_avg) += (id(price_per_kwh) - id(price_kwh_avg)) / count;
  
        id(kwh_price_average).publish_state(id(price_kwh_avg));

 
